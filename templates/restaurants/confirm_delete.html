{% extends 'base.html' %}
{% block title %}맛집 삭제 — 맛,잇다{% endblock %}

{% block content %}
<div class="row justify-content-center" style="padding-top: 2rem;">
  <div class="col-md-5 col-lg-4">

    <div class="info-card p-4 text-center">

      <div style="width: 56px; height: 56px; border-radius: 50%;
                  background: #FFF0F0; display: flex; align-items: center;
                  justify-content: center; margin: 0 auto 1.2rem;">
        <i class="bi bi-trash3" style="font-size: 1.4rem; color: #dc3545;"></i>
      </div>

      <h2 style="font-size: 1.1rem; font-weight: 800; color: var(--text);
                 letter-spacing: -0.02em; margin-bottom: 0.4rem;">
        맛집을 삭제할까요?
      </h2>

      <p style="color: var(--text-muted); font-size: 0.84rem; margin-bottom: 1.5rem;">
        <strong style="color: var(--text);">{{ restaurant.name }}</strong> 기록이<br>
        영구적으로 삭제되며 복구할 수 없어요.
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <a href="{% url 'restaurant_detail' restaurant.pk %}"
             class="btn btn-outline-secondary flex-fill py-2"
             style="font-size: 0.88rem; font-weight: 600;">
            취소
          </a>
          <button type="submit" class="btn flex-fill py-2"
                  style="background: #dc3545; color: #fff; font-size: 0.88rem;
                         font-weight: 700; border: none; border-radius: 4px;">
            삭제하기
          </button>
        </div>
      </form>

    </div>

  </div>
</div>
{% endblock %}
