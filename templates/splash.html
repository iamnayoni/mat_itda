<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛,잇다</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #fff;
      color: #1A1A1A;
      font-family: 'Pretendard', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .splash-wrap {
      text-align: center;
      animation: fadeIn 1s ease forwards;
    }
    .splash-title {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #5F0080;
    }
    .splash-title span { color: #1A1A1A; }
    .splash-slogan {
      margin-top: 1rem;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: #767676;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .splash-bar {
      width: 0;
      height: 3px;
      background: #5F0080;
      margin: 1.4rem auto 0;
      border-radius: 2px;
      animation: grow 1.8s ease forwards 0.4s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes grow {
      from { width: 0; }
      to   { width: 80px; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    .fade-out { animation: fadeOut 0.6s ease forwards; }
  </style>
</head>
<body>
  <div class="splash-wrap" id="splash">
    <div class="splash-title">맛<span>,</span>잇다</div>
    <div class="splash-slogan">맛없는 건 맛없다. 나만의 솔직한 맛집 족보</div>
    <div class="splash-bar"></div>
  </div>
  <script>
    setTimeout(function () {
      document.getElementById('splash').classList.add('fade-out');
      setTimeout(function () { window.location.href = '/restaurants/'; }, 600);
    }, 2200);
  </script>
</body>
</html>
